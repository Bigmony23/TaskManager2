{% extends 'base.html' %}
{% load static %}

{% block title %}TaskFlow - Вход в систему{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header text-center p-4" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <div class="logo-icon mb-3">
                        <i class="fas fa-tasks fa-3x text-white"></i>
                    </div>
                    <h3 class="text-white mb-0">TaskFlow</h3>
                    <p class="text-white-50 mb-0">Управление задачами</p>
                </div>
                <div class="card-body p-4">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                <i class="fas fa-{% if message.tags == 'success' %}check-circle{% elif message.tags == 'error' %}exclamation-circle{% else %}info-circle{% endif %} me-2"></i>
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                    
                    <form method="post" action="/login/">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="fas fa-user me-2 text-primary"></i>Имя пользователя
                            </label>
                            <input type="text" class="form-control form-control-lg rounded-3" 
                                   id="username" name="username" 
                                   placeholder="Введите имя пользователя"
                                   required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="fas fa-lock me-2 text-primary"></i>Пароль
                            </label>
                            <input type="password" class="form-control form-control-lg rounded-3" 
                                   id="password" name="password" 
                                   placeholder="Введите пароль"
                                   required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3" 
                                style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none;">
                            <i class="fas fa-sign-in-alt me-2"></i>Войти
                        </button>
                    </form>
                </div>
                <div class="card-footer text-center py-3 bg-transparent border-0">
                    <small class="text-muted">
                        <i class="fas fa-info-circle me-1"></i>
                        Демо-доступ: admin / admin
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
    }
    
    .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .card {
        animation: fadeInUp 0.5s ease;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}
