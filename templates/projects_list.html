{% extends 'base.html' %}
{% load static %}

{% block title %}Проекты - TaskFlow{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3">Проекты</h1>
            <p class="text-muted">Управление проектами и их аналитика</p>
        </div>
               {% if user_role == 'admin' %}
        <a href="/projects/create/" class="btn btn-primary">
            Создать  проект
        </a>
        {% endif %}
    </div>

    <div class="row" id="projects-list">
        <div class="col-12 text-center py-4">
            <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
            <p>Загрузка проектов...</p>
        </div>
    </div>
</div>

<script>
    async function loadProjects() {
        const token = localStorage.getItem('access_token');
        if (!token) return;
        
        try {
            const response = await fetch('/api/projects/', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const projects = await response.json();
                renderProjects(projects);
            }
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }
        async function deleteProject(id, name) {
        if (!confirm(`Удалить проект "${name}"? Все задачи проекта будут удалены.`)) return;
        
        const token = localStorage.getItem('access_token');
        try {
            const response = await fetch(`/api/projects/${id}/`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok || response.status === 204) {
                loadProjects(); // перезагружаем список
            } else {
                alert('Ошибка при удалении проекта');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            alert('Ошибка соединения');
        }
    }
    function renderProjects(projects) {
        const container = document.getElementById('projects-list');
        if (projects.length === 0) {
            container.innerHTML = `
                <div class="col-12 text-center py-5">
                    <i class="fas fa-folder-open fa-4x mb-3 text-muted"></i>
                    <p>Нет проектов</p>
                    <a href="/projects/create/" class="btn btn-primary">Создать первый проект</a>
                </div>`;
            return;
        }
        
        container.innerHTML = projects.map(project => `
            <div class="col-md-4 mb-3">
                <div class="card h-100" style="border-top: 4px solid ${project.color || '#667eea'}">
                    <div class="card-body">
                        <h5 class="card-title">${escapeHtml(project.name)}</h5>
                        <p class="card-text small text-muted">${escapeHtml(project.client || 'Нет заказчика')}</p>
                        <div class="progress mb-2" style="height: 6px;">
                            <div class="progress-bar" style="width: ${project.completion_percent || 0}%; background: ${project.color || '#667eea'}"></div>
                        </div>
                        <div class="d-flex justify-content-between small">
                            <span>Прогресс: ${project.completion_percent || 0}%</span>
                            <span>Задач: ${project.tasks_count || 0}</span>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent d-flex justify-content-between">
                        <a href="/projects/${project.id}/" class="btn btn-sm btn-outline-primary">Подробнее</a>
                        <a href="/projects/${project.id}/analytics/" class="btn btn-sm btn-outline-info">
                            <i class="fas fa-chart-line"></i> Аналитика
                        </a>
                     <button class="btn btn-sm btn-outline-danger" onclick="deleteProject(${project.id}, '${project.name}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    document.addEventListener('DOMContentLoaded', loadProjects);
    
</script>
{% endblock %}
